<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tic Tac Toe</title>
    <link rel="stylesheet" href="tic_toc_toc_game.css">
</head>
<body>

    <h1>Tic Tac Toe</h1>

    <h2 id="gameInfo">Player X Turn</h2>

    <div>
        X Score: <span id="scoreX">0</span> |
        O Score: <span id="scoreO">0</span>
    </div>

    <div id="gameGrid">
        <div class="box" data-pos="0"></div>
        <div class="box" data-pos="1"></div>
        <div class="box" data-pos="2"></div>

        <div class="box" data-pos="3"></div>
        <div class="box" data-pos="4"></div>
        <div class="box" data-pos="5"></div>

        <div class="box" data-pos="6"></div>
        <div class="box" data-pos="7"></div>
        <div class="box" data-pos="8"></div>
    </div>

    <button id="restartBtn">Restart Game</button>

    <script src="tic_toc_toc_game.js"></script>

</body>
</html>
